<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'hospital')}">
<body>
  <style>
    .vs { background:#0e0e0e; color:#e4e2e1; padding:16px; font-family:system-ui,sans-serif; min-height:80vh; }
    .vs h2 { color:#e4e2e1; }
    .vs .btn-vs { background:#00e5ff; color:#000; border:none; padding:6px 14px; font-weight:600; cursor:pointer; }
    .vs-table { width:100%; border-collapse:collapse; font-family:'JetBrains Mono',ui-monospace,monospace; }
    .vs-table th { text-align:left; color:#bac9cc; text-transform:uppercase; font-size:12px; border-bottom:1px solid #3b494c; padding:6px 10px; }
    .vs-table td { padding:6px 10px; border-bottom:1px solid #1b1c1c; }
    .vs-table tr.lvl-EXTREME > td { background:#ff1744; color:#fff; }
    .vs-table tr.lvl-HIGH > td, .vs-table tr.lvl-LOW > td { background:#ff9100; color:#000; }
    .vs-table tr.stale > td { color:#849396; font-style:italic; }
    .vs-table tr.blink-crit > td { animation:vsblink .6s step-start infinite; }
    .vs-table tr.blink-high > td { animation:vsblink 1.2s step-start infinite; }
    @keyframes vsblink { 50% { opacity:.35; } }
    .vs-table a { color:#00e5ff; text-decoration:none; }
    .vs-table tr.lvl-EXTREME a, .vs-table tr.lvl-HIGH a, .vs-table tr.lvl-LOW a { color:inherit; }
    .vs-table button { background:#2a2a2a; color:#e4e2e1; border:1px solid #3b494c; cursor:pointer; }
  </style>

  <div class="vs">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2>Ward Census</h2>
    <button id="sound-toggle" class="btn-vs" type="button">Enable sound</button>
  </div>

  <table class="vs-table" id="census">
    <thead>
      <tr><th>Cage</th><th>Pet</th><th>HR</th><th>SpO2</th><th>RR</th><th>Temp</th><th>Freshness</th><th>Alarm</th><th>Ack</th><th></th></tr>
    </thead>
    <tbody id="census-body"></tbody>
  </table>

  <script th:inline="javascript">
    let soundOn = false, audioCtx = null;
    const toggle = document.getElementById('sound-toggle');
    toggle.addEventListener('click', () => {
      soundOn = !soundOn;
      if (soundOn && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      toggle.textContent = soundOn ? 'Mute sound' : 'Enable sound';
      if (!soundOn) stopTone();
    });

    let beepTimer = null, osc = null, gain = null;
    function startTone(level) {
      stopTone();
      if (!audioCtx) return;
      osc = audioCtx.createOscillator();
      gain = audioCtx.createGain();
      osc.frequency.value = (level === 'EXTREME') ? 880 : 520;
      gain.gain.value = (level === 'EXTREME') ? 0.25 : 0.08;
      osc.connect(gain); gain.connect(audioCtx.destination); osc.start();
      if (level !== 'EXTREME') {
        let on = true;
        beepTimer = setInterval(() => { on = !on; gain.gain.value = on ? 0.08 : 0; }, 600);
      }
    }
    function stopTone() {
      if (beepTimer) { clearInterval(beepTimer); beepTimer = null; }
      if (osc) { try { osc.stop(); } catch (e) {} osc = null; }
    }

    function isSounding(r, now) {
      if (r.state !== 'OPEN' || !r.level) return false;
      if (r.level === 'EXTREME') return r.ackedBy == null;
      if (r.silencedUntil && now < Date.parse(r.silencedUntil)) return false;
      return true;
    }

    async function ack(petId) { await fetch('/hospital/' + petId + '/alarm/ack', { method: 'POST' }); poll(); }
    async function silence(petId) { await fetch('/hospital/' + petId + '/alarm/silence', { method: 'POST' }); poll(); }

    async function poll() {
      const rows = await (await fetch('/hospital/census')).json();
      const now = Date.now();
      const body = document.getElementById('census-body');
      body.innerHTML = '';
      let soundExtreme = false, soundAdvisory = false;
      for (const r of rows) {
        const tr = document.createElement('tr');
        if (r.level) tr.classList.add('lvl-' + r.level);
        if (r.stale) tr.classList.add('stale');
        if (r.state === 'OPEN' && !r.ackedBy) tr.classList.add(r.level === 'EXTREME' ? 'blink-crit' : 'blink-high');
        const fresh = r.stale
          ? ('stale ' + Math.floor((r.ageSeconds || 0) / 60) + 'm')
          : ((r.ageSeconds == null ? '—' : r.ageSeconds + 's') + ' ago');
        const alarmTxt = r.level ? (r.level + ' ' + (r.alarmMetric || '') + ' ' + (r.alarmValue == null ? '' : r.alarmValue) + (r.ackedBy ? ' (ack ' + r.ackedBy + ')' : '')) : '—';
        let actions = '';
        if (r.state === 'OPEN') {
          actions = '<button onclick="ack(' + r.petId + ')">Ack</button>';
          if (r.level !== 'EXTREME') actions += ' <button onclick="silence(' + r.petId + ')">Silence</button>';
        }
        tr.innerHTML =
          '<td>' + (r.cage || '—') + '</td>' +
          '<td><a href="/hospital/' + r.petId + '">' + (r.petName || r.petId) + '</a></td>' +
          '<td>' + (r.heartRate == null ? '—' : r.heartRate) + '</td>' +
          '<td>' + (r.spo2 == null ? '—' : r.spo2) + '</td>' +
          '<td>' + (r.rr == null ? '—' : r.rr) + '</td>' +
          '<td>' + (r.temp == null ? '—' : r.temp) + '</td>' +
          '<td>' + fresh + '</td>' +
          '<td>' + alarmTxt + '</td>' +
          '<td>' + (r.ackedBy || '') + '</td>' +
          '<td>' + actions + '</td>';
        body.appendChild(tr);
        if (isSounding(r, now)) {
          if (r.level === 'EXTREME') soundExtreme = true; else soundAdvisory = true;
        }
      }
      if (soundOn && soundExtreme) startTone('EXTREME');
      else if (soundOn && soundAdvisory) startTone('LOW');
      else stopTone();
    }
    setInterval(poll, 2000);
    poll();
  </script>
  </div>
</body>
</html>
